name: MAESTRO architecture validation

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout coordinator
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          path: gitlab_ynh
      - name: Checkout Runner consumer
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: faleious-ai/gitlab-runner_ynh
          path: gitlab-runner_ynh
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Compile governance sources
        run: python -m py_compile gitlab_ynh/scripts/maestro_program.py gitlab-runner_ynh/scripts/program_consumer.py
      - name: Run protected coordinator acceptance
        working-directory: gitlab_ynh
        run: python -m unittest tests.acceptance.test_autonomous_program_execution tests.acceptance.test_gitlab_autoupdate_objective tests.acceptance.test_gitlab_mcp_foundation -v
        env:
          GITLAB_MCP_ROOT: evidence/mcp/gitlab-mcp
      - name: Run Runner architecture acceptance
        working-directory: gitlab-runner_ynh
        run: python -m unittest tests.acceptance.test_program_queue_consumer tests.acceptance.test_supported_docker_default -v
      - name: Refresh and validate canonical program
        working-directory: gitlab_ynh
        run: |
          python scripts/maestro_program.py refresh-queue --root . --repo coordinator=. --repo runner=../gitlab-runner_ynh
          python scripts/maestro_program.py doctor --root . --repo coordinator=. --repo runner=../gitlab-runner_ynh
          python scripts/maestro_program.py plan --root . --repo coordinator=. --repo runner=../gitlab-runner_ynh
